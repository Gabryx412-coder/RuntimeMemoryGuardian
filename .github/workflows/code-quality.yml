name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find include src tests examples benchmarks tools \
            -type f \( -name "*.hpp" -o -name "*.cpp" \) \
            -print0 | xargs -0 clang-format-18 --dry-run --Werror -style=file

  clang-tidy:
    name: clang-tidy static analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.cc }} ${{ matrix.cxx }}
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          fi

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          EXTRA_FLAGS=""
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            EXTRA_FLAGS="-DCMAKE_CXX_FLAGS=-stdlib=libc++"
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DRMG_BUILD_TESTS=ON \
            -DRMG_BUILD_EXAMPLES=ON \
            -DRMG_BUILD_BENCHMARKS=OFF \
            -DRMG_BUILD_TOOLS=ON \
            -DRMG_WARNINGS_AS_ERRORS=ON \
            -DRMG_ENABLE_SANITIZERS=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }} \
            $EXTRA_FLAGS

      - name: Run clang-tidy on library sources
        run: |
          find src -type f -name "*.cpp" -print0 | \
            xargs -0 clang-tidy-18 -p build --quiet

  sanitizers:
    name: ASan + UBSan test run
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang-18

      - name: Configure CMake with sanitizers
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DRMG_BUILD_TESTS=ON \
            -DRMG_BUILD_EXAMPLES=OFF \
            -DRMG_BUILD_TOOLS=OFF \
            -DRMG_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests under sanitizers
        working-directory: build
        run: ctest --output-on-failure --parallel 2