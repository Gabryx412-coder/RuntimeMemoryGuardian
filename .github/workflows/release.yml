name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux artifact
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRMG_BUILD_TESTS=OFF \
            -DRMG_BUILD_EXAMPLES=OFF \
            -DRMG_BUILD_TOOLS=ON \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Package
        run: |
          tar -czf RuntimeMemoryGuardian-${{ github.ref_name }}-linux-x64.tar.gz -C install .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: RuntimeMemoryGuardian-${{ github.ref_name }}-linux-x64.tar.gz

  build-windows:
    name: Build Windows artifact
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DRMG_BUILD_TESTS=OFF `
            -DRMG_BUILD_EXAMPLES=OFF `
            -DRMG_BUILD_TOOLS=ON `
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release

      - name: Package
        run: Compress-Archive -Path install\* -DestinationPath RuntimeMemoryGuardian-${{ github.ref_name }}-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: RuntimeMemoryGuardian-${{ github.ref_name }}-windows-x64.zip

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-package/*.tar.gz
            artifacts/windows-package/*.zip
          generate_release_notes: true